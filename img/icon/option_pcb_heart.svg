<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Heart shape -->
  <path d="M32 54 C32 54, 6 36, 6 22 C6 12, 14 6, 24 6 C28 6, 32 10, 32 14 C32 10, 36 6, 40 6 C50 6, 58 12, 58 22 C58 36, 32 54, 32 54Z" fill="#1a1a2e"/>
  <!-- Circuit traces inside heart -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none" filter="url(#glow)" stroke-linecap="round">
    <!-- Main vertical bus -->
    <line x1="32" y1="14" x2="32" y2="46"/>
    <!-- Horizontal branches -->
    <path d="M32 18 L42 18 L42 24"/>
    <path d="M32 18 L22 18 L22 24"/>
    <path d="M32 26 L20 26 L16 30"/>
    <path d="M32 26 L44 26 L48 30"/>
    <path d="M32 34 L24 34 L20 38"/>
    <path d="M32 34 L40 34 L44 38"/>
    <path d="M32 42 L28 42"/>
    <path d="M32 42 L36 42"/>
  </g>
  <!-- Nodes -->
  <g fill="#00d4ff" filter="url(#glow)">
    <circle cx="32" cy="14" r="2"/>
    <circle cx="42" cy="24" r="1.5"/>
    <circle cx="22" cy="24" r="1.5"/>
    <circle cx="16" cy="30" r="1.5"/>
    <circle cx="48" cy="30" r="1.5"/>
    <circle cx="20" cy="38" r="1.5"/>
    <circle cx="44" cy="38" r="1.5"/>
    <circle cx="28" cy="42" r="1.5"/>
    <circle cx="36" cy="42" r="1.5"/>
    <circle cx="32" cy="46" r="2"/>
  </g>
  <!-- Heart outline glow -->
  <path d="M32 54 C32 54, 6 36, 6 22 C6 12, 14 6, 24 6 C28 6, 32 10, 32 14 C32 10, 36 6, 40 6 C50 6, 58 12, 58 22 C58 36, 32 54, 32 54Z" fill="none" stroke="#bf616a" stroke-width="2" filter="url(#glow)"/>
</svg>
